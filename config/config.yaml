agent:
  name: claw-agent
  version: 0.1.0
  log_level: INFO
  log_file: logs/agent.log

llm:
  provider: ${OPENCLAW_PROVIDER:-openrouter}
  api_key: ${OPENCLAW_API_KEY}
  model: ${OPENCLAW_MODEL:-openai/gpt-4o}
  base_url: ${OPENCLAW_BASE_URL:-}
  temperature: 0.2
  max_tokens: 4096

server:
  host: ${WEBHOOK_HOST:-0.0.0.0}
  port: ${WEBHOOK_PORT:-8080}

database:
  url: ${DATABASE_URL:-sqlite:///data/agent.db}

integrations:
  slack:
    enabled: true
  github:
    enabled: true
  jira:
    enabled: true
  confluence:
    enabled: true
  jenkins:
    enabled: true
  gmail:
    enabled: true

workflows:
  directory: workflows
